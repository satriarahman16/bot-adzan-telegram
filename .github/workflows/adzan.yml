name: Bot Adzan Terjadwal

on:
  schedule:
    # Berjalan setiap 5 menit
    - cron: '*/5 * * * *'
  workflow_dispatch: # Supaya bisa ditest manual kapan saja

jobs:
  check_adzan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # Diupdate dari v3 ke v4
      - name: Setup Python
        uses: actions/setup-python@v5 # Diupdate dari v4 ke v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install requests
      - name: Run Bot
        run: python main.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}