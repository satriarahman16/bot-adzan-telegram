name: Bot Adzan Terjadwal

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check_adzan:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Kode
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests pytz --quiet  # ✅ Tambah pytz!

      - name: Cek Waktu Debug
        run: |
          echo "UTC  : $(date -u '+%H:%M')"
          echo "WIT  : $(TZ='Asia/Jayapura' date '+%H:%M')"

      - name: Run Bot
        run: python main.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}